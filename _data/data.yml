career-profile:
  title: Perfil Profesional
  summary: |
    Profesional de TI con más de 12 años de experiencia en administración
    de sistemas, operación de infraestructuras y soporte técnico. Especializado
    en entornos Linux/RHEL, virtualización con Proxmox, contenedores Docker
    y servidores de aplicaciones como Tomcat o WildFly. Mi objetivo en incorporarme 
    a una empresa donde poner en práctica todos mis conocimientos y crecer en el área laboral,
    personal e intelectual.

